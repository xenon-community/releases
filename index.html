
<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xenon Community Releases</title>
  <style>
    @font-face {
      font-family: 'WantedSansBold';
      src: url('WantedSans-Bold-BF65baf135d5a25.otf') format('opentype');
      font-weight: 700;
      font-style: normal;
    }
    @font-face {
      font-family: 'WantedSansMedium';
      src: url('WantedSans-Medium-BF65baf1388963b.otf') format('opentype');
      font-weight: 500;
      font-style: normal;
    }
    body {
      margin: 0;
      min-height: 100vh;
      position: relative;
      font-family: 'WantedSansBold', sans-serif;
      background: #fff;
    }
    .top-right {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 1760px;
      height: 207px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 40px;
      box-sizing: border-box;
      background: #e4efff;
      color: #000;
      z-index: 10;
    }
    .top-right img {
      display: block;
      height: 56px;
      width: auto;
    }
    .top-right .label {
      font-size: 28px;
      font-weight: 700;
      color: #000;
      white-space: nowrap;
    }
    .yellow-box {
      width: 1913px;
      height: 485px;
      background: #ffd400;
      position: absolute;
      top: 207px;
      left: 50%;
      transform: translateX(-50%);
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    }
    .title-box {
      position: absolute;
      top: 240px;
      left: calc(50% - 956.5px + 36px);
      font-family: 'WantedSansMedium', sans-serif;
      font-size: 42px;
      font-weight: 500;
      color: #000;
      white-space: nowrap;
      z-index: 5;
    }
  </style>
</head>
<body>
  <div class="top-right">
    <img src="XenonCommunityOnlyText-removebg-preview.png" alt="Xenon Community">
    <div class="label">Releases</div>
  </div>
  <div class="yellow-box"></div>
  <div class="title-box">Newest Xenon Community Releases</div>
</body>
</html>
